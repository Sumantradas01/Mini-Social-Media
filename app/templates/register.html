<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nova Auth SPA</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="../static/css/register.css">
</head>
<body>

  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>
  <div class="bg-blob blob-3"></div>

  <div class="page-wrapper">

    <!-- LEFT PANEL -->
    <aside class="left-panel">
      <div class="brand">
        <span class="brand-icon">N</span>
        <span class="brand-name">Nova</span>
      </div>

      <div class="panel-copy">
        <h1>Connect.<br/>Share.<br/>Belong.</h1>
        <p>Join millions of people on Nova.</p>
      </div>
    </aside>

    <!-- RIGHT PANEL -->
    <main class="right-panel">

      <div class="form-card">

        <!-- TOP SWITCH -->
        <div class="auth-switch">
          <button class="switch-btn active" id="loginTab">Login</button>
          <button class="switch-btn" id="registerTab">Register</button>
        </div>

        <!-- LOGIN FORM -->
        <form id="loginForm" class="auth-form active">

          <h2 class="form-title">Welcome Back</h2>
          <p class="form-sub">Login to continue</p>

          <div class="field-group">
            <label>Email</label>
            <input type="email" placeholder="Enter email">
          </div>

          <div class="field-group">
            <label>Password</label>

            <div class="input-suffix-wrap">
              <input type="password" id="loginPassword" placeholder="Password">

              <button type="button" class="toggle-pass" data-target="loginPassword">
                👁
              </button>
            </div>
          </div>

          <button class="submit-btn">
            Login
          </button>

        </form>

        <!-- REGISTER FORM -->
        <form id="registerForm" class="auth-form">

          <h2 class="form-title">Create Account</h2>
          <p class="form-sub">Join Nova today</p>

          <div class="input-row two-col">

            <div class="field-group">
              <label>Full Name</label>
              <input type="text" placeholder="John Doe">
            </div>

            <div class="field-group">
              <label>Username</label>

              <div class="input-prefix-wrap">
                <span class="prefix">@</span>
                <input type="text" placeholder="johndoe">
              </div>
            </div>

          </div>

          <div class="field-group">
            <label>Email</label>
            <input type="email" placeholder="john@example.com">
          </div>

          <div class="field-group">
            <label>Password</label>

            <div class="input-suffix-wrap">
              <input type="password" id="registerPassword" placeholder="Password">

              <button type="button" class="toggle-pass" data-target="registerPassword">
                👁
              </button>
            </div>
          </div>

          <button class="submit-btn">
            Create Account
          </button>

        </form>

      </div>

    </main>

  </div>

  <script src="../static/js/register.js"></script>

</body>
</html>
